name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

jobs:
  run_on_linux_server :
    runs-on: ubuntu-latest # we can choose a specific linux distribution if it needs
    name: Builds on ${{matrix.distro}} and ${{matrix.arch}}
    
    strategy:
      matrix:
        include:
          - arch: armv6
            distro: bullseye
    
    steps:
      - uses: actions/checkout@v3
      - uses: uraimo/run-on-arch-action@v2
        name: Build Artifacts
        id: build
        with:
          arch: ${{matrix.arxh}}
          distro: ${{matrix.distro}}

      - name: Compile the file from the repo
        run: |
          g++ -c -Wall -g Main.cpp
          g++ -g -o Main.exe Main.o
          ./Main.exe

