name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

jobs:
  linux_arm32/64:
    name: Run arm32 and arm64 architectures for linux latest distributions
    runs-on: ubuntu-latest # we can choose a specific linux distribution if it needs

    # Run steps on a matrix of 4 arch/distro combinations
    strategy:
      matrix:
        include:
          - arch: aarch64
            distro: ubuntu18.04
          - arch: ppc64le
            distro: alpine_latest
          - arch: s390x
            distro: fedora_latest
          - arch: armv7
            distro: archarm_latest

    steps:
    - name: 🛎️ Checkout Repo
      uses: actions/checkout@v3

      run: |
        g++ -c -Wall -g Main.cpp
        g++ -g -0 Main.exe Main.o

  windows_arm32/64:
    needs: [linux_arm32]  # linux job should complete in order to run this one. If there is problem in linux, no need to run this job
    name: Run arm32 and arm64 architectures for linux latest distributions
    runs-on: windows-latest

      # Run steps on a matrix of 4 arch/distro combinations
      strategy:
        matrix:
          include:
            - arch: aarch64
              distro: ubuntu18.04
            - arch: ppc64le
              distro: alpine_latest
            - arch: s390x
              distro: fedora_latest
            - arch: armv7
              distro: archarm_latest

      steps:
      - name: 🛎️ Checkout Repo
        uses: actions/checkout@v3

        run: |
          g++ -c -Wall -g Main.cpp
          g++ -g -0 Main.exe Main.o
