name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

jobs:
  run_on_linux_server :
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the code
      - uses: actions/checkout@v3
      - name: Build the project
        uses: nicledomaS/cmake_build_action@v1.4
        with:
          submodule_update: ON
          run_tests: ON
          unit_test_build: -Dtest=ON
        
      - name: Set the arch and distro of the platform
        with:
          arch: armv6
          distro: bullseye

      - name: Compile the file from the repo
        run: |
          g++ -c -Wall -g Main.cpp
          g++ -g -o Main.exe Main.o
          ./Main.exe
          
      
      - name: Create artifacts
        uses: actions/upload-artifact@v2

