name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

env:
  ARTIFACT_NAME: myartifact
  #PATH_OF_SCRIPT: cd .github/workflows

jobs:
  armv6 :

    runs-on: ubuntu-18.04

    name: Builds on ubuntu-18.04 for Jenk
    steps:
        - name: Checkout the code
          uses: actions/checkout@v2.1.0

        - name: Run the bash script
          run: | #when execute the script, I use 'bash ./run.sh' because the 'sh ./run.sh' doesn't have the '[[ ... ]]' testing syntax
            echo "Run the bash script to check the environment"
            cd .github/workflows
            chmod +x run.sh
            echo "TEST=$(bash ./run.sh | tail -n 1)" >> $GITHUB_ENV

        - name: Check the variable Value
          run: echo $TEST


