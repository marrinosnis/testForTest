name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

env:
  ARTIFACT_NAME: myartifact

jobs:
  run_on_linux_server :

    runs-on: ubuntu-latest

    name: Build on ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv6
            distro: bullseye

    steps:
      - uses: actions/checkout@v2.1.0
      - uses: uraimo/run-on-arch-action@v2
        name: Something that you should not know
        id: build
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}


      - name: Create artifacts
        uses: actions/upload-artifact@v2
