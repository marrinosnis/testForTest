name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

jobs:
  run on linux server :
    name: Armv6 architecture for linux latest distributions
    runs-on: ubuntu-latest # we can choose a specific linux distribution if it needs

    steps:
    - name: 🛎️ Checkout Repo
      uses: actions/checkout@v3

    - name: Compile the file from the repo
      run: |
        g++ -c -Wall -g Main.cpp
        g++ -g -o Main.exe Main.o
        ./Main.exe

    -name: Run for armv6 architecture
      with:
        - arch: armv6
          distro: bullseye

    -name: Create arctifacts
      uses: actions/upload-artifact@v3
