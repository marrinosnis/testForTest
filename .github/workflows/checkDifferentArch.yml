name: check Different Architectures

on: [push]  # create list, to indicate when the workflow will run

env:
  ARTIFACT_NAME: myartifact

jobs:
  armv6 :

    runs-on: ubuntu-18.04
    name: Builds on ubuntu-18.04 armv6
    steps:
        - name: Checkout the code
          uses: actions/checkout@v2.1.0
        
        - name: Run on the uraimo action
          uses: uraimo/run-on-arch-action@v2
          with:
            arch: armv6
            distro: bullseye

        - name: Run the bash script
          run: |
            sh ./run.sh
        - name: Compile the file from the repo
          run: |
            pwd
            ls
            g++ -c -Wall -g Main.cpp
            g++ -g -o Main.exe Main.o
            ./Main.exe

        - name: Create artifacts
          uses: actions/upload-artifact@v2
          with:
            name: ${{env.ARTIFACT_NAME}}
            path: .
